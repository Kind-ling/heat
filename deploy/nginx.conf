# nginx.conf — Heat reverse proxy
# Place at: /etc/nginx/sites-available/heat
# Enable:   sudo ln -s /etc/nginx/sites-available/heat /etc/nginx/sites-enabled/heat
#           sudo nginx -t && sudo systemctl reload nginx

# Rate limiting: 10 req/s per IP, burst 20
limit_req_zone $binary_remote_addr zone=heat_limit:10m rate=10r/s;

server {
    listen 80;
    listen [::]:80;
    # Replace with your domain, or use _ to catch all:
    server_name _;

    # Redirect HTTP → HTTPS (enable once TLS is configured)
    # return 301 https://$host$request_uri;

    # ── /heat/* proxy ─────────────────────────────────────────────────────────
    location /heat/ {
        limit_req zone=heat_limit burst=20 nodelay;

        proxy_pass         http://127.0.0.1:3001/heat/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        proxy_read_timeout  30s;
        proxy_send_timeout  30s;
        proxy_connect_timeout 5s;

        # Security headers
        add_header X-Content-Type-Options  "nosniff"          always;
        add_header X-Frame-Options         "DENY"             always;
        add_header X-XSS-Protection        "1; mode=block"    always;
        add_header Referrer-Policy         "no-referrer"      always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    }

    # ── /health passthrough ───────────────────────────────────────────────────
    location = /health {
        proxy_pass         http://127.0.0.1:3001/health;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        access_log         off;
    }

    # ── Deny everything else ──────────────────────────────────────────────────
    location / {
        return 404;
    }
}

